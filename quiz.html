<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — IB na Prática</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d1117;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .quiz-wrap { width: 100%; max-width: 760px; }

  /* Header */
  .quiz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .quiz-brand {
    font-size: .75rem; font-weight: 700; letter-spacing: .12em;
    color: #ce93d8; text-transform: uppercase;
  }
  .quiz-progress-wrap { flex: 1; margin: 0 20px; }
  .quiz-progress-bar {
    height: 4px; background: rgba(255,255,255,.08); border-radius: 2px; overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%; background: linear-gradient(90deg, #7b1fa2, #ce93d8);
    border-radius: 2px; transition: width .4s ease;
  }
  .quiz-counter { font-size: .82rem; color: #78909c; white-space: nowrap; }

  /* Card */
  .quiz-card {
    background: #161b22; border: 1px solid rgba(255,255,255,.07);
    border-radius: 18px; padding: 40px; margin-bottom: 20px;
  }

  /* Name screen */
  .name-screen h2 {
    font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 10px;
  }
  .name-screen p { font-size: 1rem; color: #78909c; margin-bottom: 28px; }
  .name-input {
    width: 100%; padding: 14px 18px; font-size: 1rem;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.12);
    border-radius: 10px; color: #fff; outline: none; margin-bottom: 16px;
    transition: border-color .15s;
  }
  .name-input:focus { border-color: rgba(206,147,216,.5); }
  .name-input::placeholder { color: #4a5568; }

  .btn-start {
    width: 100%; padding: 14px; font-size: 1rem; font-weight: 600;
    background: linear-gradient(135deg, #7b1fa2, #ab47bc);
    border: none; border-radius: 10px; color: #fff; cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn-start:hover { opacity: .88; transform: translateY(-1px); }
  .btn-start:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* Question */
  .question-num {
    font-size: .75rem; font-weight: 700; letter-spacing: .1em;
    color: #ce93d8; text-transform: uppercase; margin-bottom: 14px;
  }
  .question-text {
    font-size: 1.25rem; font-weight: 600; color: #fff;
    line-height: 1.55; margin-bottom: 32px;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 18px;
    background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08);
    border-radius: 10px; cursor: pointer; transition: background .15s, border-color .15s, transform .1s;
    text-align: left; width: 100%; color: #b0bec5; font-size: 1rem; line-height: 1.5;
  }
  .option:hover:not(.locked) {
    background: rgba(255,255,255,.06); border-color: rgba(206,147,216,.35);
    color: #e0e0e0; transform: translateX(3px);
  }
  .option-letter {
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
    font-size: .82rem; font-weight: 700; color: #90a4ae; flex-shrink: 0;
    transition: background .15s, border-color .15s;
  }
  .option.correct { background: rgba(67,160,71,.15); border-color: rgba(67,160,71,.6); color: #a5d6a7; }
  .option.correct .option-letter { background: rgba(67,160,71,.3); border-color: rgba(67,160,71,.8); color: #a5d6a7; }
  .option.wrong { background: rgba(229,57,53,.12); border-color: rgba(229,57,53,.5); color: #ef9a9a; }
  .option.wrong .option-letter { background: rgba(229,57,53,.25); border-color: rgba(229,57,53,.7); color: #ef9a9a; }
  .option.dimmed { opacity: .38; }
  .option.locked { cursor: default; }

  /* Feedback */
  .feedback { display: none; margin-top: 20px; padding: 14px 18px; border-radius: 10px; font-size: .95rem; line-height: 1.5; }
  .feedback.show { display: block; }
  .feedback.ok { background: rgba(67,160,71,.12); border: 1px solid rgba(67,160,71,.4); color: #a5d6a7; }
  .feedback.nok { background: rgba(229,57,53,.1); border: 1px solid rgba(229,57,53,.35); color: #ef9a9a; }

  /* Next btn */
  .btn-next {
    display: none; margin-top: 24px; padding: 14px 32px;
    background: linear-gradient(135deg, #7b1fa2, #ab47bc);
    border: none; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: opacity .15s, transform .1s;
  }
  .btn-next.show { display: block; }
  .btn-next:hover { opacity: .88; transform: translateY(-1px); }

  /* Score screen */
  .score-screen { display: none; text-align: center; padding: 20px 0; }
  .score-screen.show { display: block; }
  .score-circle {
    width: 120px; height: 120px; border-radius: 50%; border: 4px solid #ce93d8;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0 auto 28px; background: rgba(142,36,170,.12);
  }
  .score-num { font-size: 2.4rem; font-weight: 700; color: #ce93d8; line-height: 1; }
  .score-den { font-size: .9rem; color: #90a4ae; margin-top: 2px; }
  .score-title { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 10px; }
  .score-sub { font-size: 1rem; color: #90a4ae; margin-bottom: 20px; }
  .score-name-badge {
    display: inline-block; padding: 6px 18px; border-radius: 20px;
    background: rgba(206,147,216,.12); border: 1px solid rgba(206,147,216,.3);
    color: #ce93d8; font-size: .9rem; font-weight: 600; margin-bottom: 24px;
  }
  .score-breakdown { display: flex; justify-content: center; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
  .score-tag { padding: 6px 16px; border-radius: 20px; font-size: .88rem; font-weight: 600; }
  .score-tag.ok { background: rgba(67,160,71,.15); color: #a5d6a7; border: 1px solid rgba(67,160,71,.35); }
  .score-tag.nok { background: rgba(229,57,53,.12); color: #ef9a9a; border: 1px solid rgba(229,57,53,.3); }

  .submit-status {
    font-size: .88rem; color: #78909c; margin-bottom: 20px; min-height: 20px;
  }
  .submit-status.ok { color: #a5d6a7; }
  .submit-status.err { color: #ef9a9a; }

  .score-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-leaderboard {
    padding: 13px 28px; background: linear-gradient(135deg, #7b1fa2, #ab47bc);
    border: none; border-radius: 10px; color: #fff; font-size: .95rem; font-weight: 600;
    cursor: pointer; text-decoration: none; display: inline-block;
    transition: opacity .15s;
  }
  .btn-leaderboard:hover { opacity: .88; }
  .btn-restart {
    padding: 13px 28px; background: transparent;
    border: 1px solid rgba(206,147,216,.4); border-radius: 10px;
    color: #ce93d8; font-size: .95rem; font-weight: 600;
    cursor: pointer; transition: background .15s;
  }
  .btn-restart:hover { background: rgba(206,147,216,.08); }

  @media (max-width: 600px) {
    .quiz-card { padding: 24px 20px; }
    .question-text { font-size: 1.1rem; }
    .option { font-size: .95rem; }
  }
</style>
</head>
<body>
<div class="quiz-wrap">

  <div class="quiz-header">
    <span class="quiz-brand">IB na Prática</span>
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <span class="quiz-counter" id="counter">1 / 10</span>
  </div>

  <!-- Name screen -->
  <div class="quiz-card name-screen" id="nameScreen">
    <h2>Quiz — IB na Prática</h2>
    <p>Digite seu nome para registrar sua pontuação no ranking da turma.</p>
    <input class="name-input" id="nameInput" type="text" placeholder="Seu nome completo" maxlength="60"
      oninput="document.getElementById('btnStart').disabled = this.value.trim().length < 2"
      onkeydown="if(event.key==='Enter') startQuiz()">
    <button class="btn-start" id="btnStart" onclick="startQuiz()" disabled>Começar →</button>
  </div>

  <!-- Question card -->
  <div class="quiz-card" id="questionCard" style="display:none;">
    <div class="question-num" id="qNum">Pergunta 1</div>
    <div class="question-text" id="qText"></div>
    <div class="options" id="optionsWrap"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">Próxima →</button>
  </div>

  <!-- Score screen -->
  <div class="quiz-card score-screen" id="scoreScreen">
    <div class="score-circle">
      <div class="score-num" id="scoreNum">0</div>
      <div class="score-den">/ 10</div>
    </div>
    <div class="score-title" id="scoreTitle"></div>
    <div class="score-sub" id="scoreSub"></div>
    <div class="score-name-badge" id="scoreNameBadge"></div>
    <div class="score-breakdown" id="scoreBreakdown"></div>
    <div class="submit-status" id="submitStatus"></div>
    <div class="score-actions">
      <a class="btn-leaderboard" href="leaderboard.html">Ver ranking da turma →</a>
      <button class="btn-restart" onclick="restart()">Refazer</button>
    </div>
  </div>

</div>
<script>
// ── CONFIG ──────────────────────────────────────────────────
// Cole aqui a URL do seu Google Apps Script após o deploy:
const SCRIPT_URL = '';
// ────────────────────────────────────────────────────────────

const questions = [
  {
    text: "O que é o mercado de capitais?",
    options: [
      "Sistema onde apenas bancos emprestam dinheiro às empresas",
      "Conjunto de mecanismos que permite poupadores direcionarem recursos a quem precisa de capital",
      "Mercado exclusivo para negociação de ações na bolsa",
      "Sistema de câmbio entre moedas estrangeiras"
    ],
    correct: 1,
    explanation: "O mercado de capitais conecta poupadores a tomadores, transferindo o risco diretamente ao investidor — diferente do crédito bancário, onde o risco fica no balanço do banco."
  },
  {
    text: "Uma empresa de médio porte quer securitizar suas duplicatas mas tem rating abaixo do investment grade. Qual a principal vantagem estrutural do FIDC nesse cenário?",
    options: [
      "O FIDC dispensa rating para ser registrado na CVM, simplificando o processo",
      "O custo de captação reflete o risco dos sacados (clientes da empresa), não o risco da própria cedente",
      "O FIDC elimina a necessidade de garantias reais ou fidejussórias na operação",
      "A empresa deixa de precisar de balanço auditado durante a vigência do fundo"
    ],
    correct: 1,
    explanation: "O FIDC 'descola' o custo de funding do risco do cedente. Uma empresa com risco B pode ter clientes (sacados) com risco AA — o fundo é precificado pelo risco desses sacados, tornando a taxa muito mais competitiva do que qualquer captação direta da empresa."
  },
  {
    text: "Em um FIDC com três classes de cotas (Sênior, Mezanino e Subordinada), qual absorve as primeiras perdas da carteira?",
    options: [
      "Cota Sênior — tem prioridade no recebimento",
      "Cota Mezanino — fica no meio da estrutura",
      "Cota Subordinada (JR) — funciona como colchão de proteção",
      "O custodiante, que é o responsável legal pelo lastro"
    ],
    correct: 2,
    explanation: "A Cota Subordinada (JR) absorve as primeiras perdas antes de qualquer impacto na Sênior ou Mezanino. É o 'skin in the game' — geralmente subscrita pelo próprio cedente."
  },
  {
    text: "Em uma operação de Risco Sacado performada, qual condição é essencial para que o FIDC possa cobrar o recebível diretamente da empresa âncora?",
    options: [
      "A empresa âncora deve ter rating mínimo de grau de investimento (BBB-)",
      "O fornecedor deve manter ao menos 10% das cotas subordinadas do fundo",
      "O produto ou serviço deve ter sido efetivamente entregue e aceito (nota fiscal confirmada)",
      "A operação deve ser registrada na B3 com código ISIN próprio antes da cessão"
    ],
    correct: 2,
    explanation: "No Risco Sacado performado, a entrega já ocorreu — esse é o ponto crítico. Se o bem ou serviço não foi entregue, a empresa âncora pode recusar o pagamento alegando inadimplemento contratual. Por isso a verificação de lastro (NF aceita, confirmação de recebimento) é tão importante na due diligence."
  },
  {
    text: "Qual participante do FIDC é responsável por verificar o lastro dos recebíveis cedidos?",
    options: [
      "Gestor — define a política de crédito e aprova a aquisição",
      "Administrador — representa o fundo perante a CVM",
      "Custodiante — guarda e valida a existência dos recebíveis",
      "Agente de Cobrança — faz a régua de inadimplência"
    ],
    correct: 2,
    explanation: "O Custodiante valida que os recebíveis existem (NF, CCB etc.) e verifica a elegibilidade. A Resolução CVM 175 aumentou significativamente suas obrigações nessa função."
  },
  {
    text: "O que são os critérios de elegibilidade de um FIDC?",
    options: [
      "Requisitos mínimos para investidores aplicarem nas cotas",
      "Regras do regulamento que definem quais recebíveis podem ser cedidos ao fundo",
      "Condições contratuais para o administrador ser contratado",
      "Metas de retorno mínimo do gestor para cada classe de cota"
    ],
    correct: 1,
    explanation: "Os critérios de elegibilidade filtram quais recebíveis entram no fundo — ex: prazo máximo, concentração máxima por sacado, sacados sem atraso, notas fiscais com CNPJ válido."
  },
  {
    text: "Por que o FIDC Multicedente Multisacado (MC/MS) tipicamente exige maior subordinação do que um FIDC de Consignado Público?",
    options: [
      "Porque o MC/MS opera com recebíveis de prazo mais longo, aumentando o risco de duration",
      "Porque a CVM 175 exige subordinação mínima de 30% para FIDCs de fomento mercantil",
      "Porque os sacados do MC/MS são empresas (frequentemente PMEs) com maior risco de inadimplência, e a qualidade da carteira depende do consultor de fomento",
      "Porque o Consignado Público tem isenção de IR que reduz a necessidade de proteção estrutural"
    ],
    correct: 2,
    explanation: "No MC/MS os sacados são empresas, muitas vezes PMEs, e o risco de crédito é mais disperso e incerto. Além disso, a qualidade da carteira depende muito do consultor de fomento — um ponto de atenção crítico. No Consignado Público, o desconto em folha e o risco do ente público (INSS, Estados) oferecem proteção estrutural muito maior, permitindo subordinações menores."
  },
  {
    text: "Qual a principal vantagem tributária do FIDC para a empresa que emite debênture ou cede recebíveis ao fundo?",
    options: [
      "A empresa fica isenta de IRPJ e CSLL enquanto o FIDC existir",
      "A despesa financeira paga ao FIDC é dedutível, reduzindo a base de cálculo de IRPJ + CSLL (34%)",
      "A empresa não paga PIS/Cofins sobre a receita operacional durante a operação",
      "O ganho de capital na cessão dos recebíveis é isento de imposto"
    ],
    correct: 1,
    explanation: "A empresa deduz a despesa financeira da base de IRPJ + CSLL. Com alíquota combinada de 34%, cada R$ 1,00 de despesa financeira gera R$ 0,34 de economia fiscal real."
  },
  {
    text: "Um FIDC tem estrutura: Sênior 75% do PL a 16% a.a., Mezanino 5% do PL a 20% a.a. e JR 20% do PL. O acionista quer retorno de 30% a.a. na cota JR. Custos operacionais: 2% a.a. Inadimplência esperada: 2% a.a. Qual a taxa mínima de cessão?",
    options: [
      "19% a.a.",
      "21% a.a.",
      "23% a.a.",
      "25% a.a."
    ],
    correct: 2,
    explanation: "Waterfall: (75%×16%) + (5%×20%) + (20%×30%) + 2% + 2% = 12% + 1% + 6% + 2% + 2% = 23% a.a. Cada componente precisa ser ponderado pelo seu percentual no PL. Quem esquece os custos operacionais ou a inadimplência chega em 19% — e o deal quebra na prática."
  },
  {
    text: "Qual a diferença entre um FIDC 'performado' e um FIDC 'a performar'?",
    options: [
      "No performado, os recebíveis têm prazo superior a 12 meses",
      "No performado, o produto ou serviço já foi entregue e o crédito já existe de fato",
      "O 'a performar' exige subordinação mínima maior pelo maior risco",
      "No performado, o cedente é sempre uma instituição financeira regulada"
    ],
    correct: 1,
    explanation: "No performado, o bem/serviço já foi entregue — a dívida é certa (ex: duplicatas). No 'a performar', o crédito depende de entrega futura (ex: mensalidades de escola), adicionando risco de descumprimento."
  }
];

let current = 0;
let score = 0;
let playerName = '';

function startQuiz() {
  const name = document.getElementById('nameInput').value.trim();
  if (name.length < 2) return;
  playerName = name;
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('questionCard').style.display = 'block';
  render();
}

function render() {
  const q = questions[current];
  document.getElementById('qNum').textContent = `Pergunta ${current + 1}`;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('counter').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('progressFill').style.width = `${(current / questions.length) * 100}%`;

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  ['A','B','C','D'].forEach((letter, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-letter">${letter}</span><span>${q.options[i]}</span>`;
    btn.onclick = () => selectOption(i);
    wrap.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('btnNext').className = 'btn-next';
}

function selectOption(chosen) {
  const q = questions[current];
  const opts = document.querySelectorAll('.option');
  const fb = document.getElementById('feedback');
  const letters = ['A','B','C','D'];

  opts.forEach(o => o.classList.add('locked'));

  if (chosen === q.correct) {
    opts[chosen].classList.add('correct');
    fb.className = 'feedback ok show';
    fb.innerHTML = `<strong>✓ Correto!</strong> ${q.explanation}`;
    score++;
  } else {
    opts[chosen].classList.add('wrong');
    opts[q.correct].classList.add('correct');
    opts.forEach((o, i) => { if (i !== chosen && i !== q.correct) o.classList.add('dimmed'); });
    fb.className = 'feedback nok show';
    fb.innerHTML = `<strong>✗ Incorreto.</strong> A resposta certa é <strong>${letters[q.correct]}</strong>. ${q.explanation}`;
  }

  document.getElementById('btnNext').className = 'btn-next show';
  document.getElementById('btnNext').textContent = current < questions.length - 1 ? 'Próxima →' : 'Ver resultado →';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) showScore();
  else render();
}

function showScore() {
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('counter').textContent = `${questions.length} / ${questions.length}`;

  const screen = document.getElementById('scoreScreen');
  screen.classList.add('show');
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreNameBadge').textContent = playerName;

  const pct = (score / questions.length) * 100;
  let title, sub;
  if (pct === 100)     { title = 'Perfeito! 🏆';     sub = 'Você domina o conteúdo. Está pronto para o mercado.'; }
  else if (pct >= 80)  { title = 'Muito bem!';        sub = 'Ótimo domínio. Revise as questões que errou.'; }
  else if (pct >= 60)  { title = 'Bom resultado.';    sub = 'Você assimilou o essencial. Vale revisar os blocos de FIDC.'; }
  else                 { title = 'Continue estudando.'; sub = 'Revise os materiais dos blocos 2 a 5 e refaça o quiz.'; }

  document.getElementById('scoreTitle').textContent = title;
  document.getElementById('scoreSub').textContent = sub;
  document.getElementById('scoreBreakdown').innerHTML = `
    <span class="score-tag ok">✓ ${score} corretas</span>
    <span class="score-tag nok">✗ ${questions.length - score} incorretas</span>
  `;

  submitScore();
}

function submitScore() {
  const status = document.getElementById('submitStatus');
  if (!SCRIPT_URL) {
    status.textContent = '';
    return;
  }
  status.textContent = 'Enviando resultado...';
  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ nome: playerName, pontuacao: score, total: questions.length })
  })
  .then(() => {
    status.className = 'submit-status ok';
    status.textContent = '✓ Resultado enviado para o ranking da turma!';
  })
  .catch(() => {
    status.className = 'submit-status err';
    status.textContent = 'Não foi possível enviar. Verifique a conexão.';
  });
}

function restart() {
  current = 0; score = 0; playerName = '';
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('nameScreen').style.display = 'block';
  document.getElementById('nameInput').value = '';
  document.getElementById('btnStart').disabled = true;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('counter').textContent = '1 / 10';
}
</script>
</body>
</html>
